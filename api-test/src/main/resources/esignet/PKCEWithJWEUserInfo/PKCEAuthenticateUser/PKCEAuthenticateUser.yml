      role: resident
      restMethod: post
      checkErrorsOnlyInResponse: true
      validityCheckRequired: true
      additionalDependencies: TC_ESignet_PKCE_JWE_OAuthDetails_01
      inputTemplate: esignet/PKCEWithJWEUserInfo/PKCEAuthenticateUser/PKCEAuthenticateUser
      outputTemplate: esignet/PKCEWithJWEUserInfo/PKCEAuthenticateUser/PKCEAuthenticateUserResult
      input: '{
        "encodedHash": "$ID:OAuthDetailsRequest_PKCE_JWE_Valid_Smoke_sid_encodedResp$",
      	"requestTime": "$TIMESTAMP$",
      	"transactionId": "$ID:OAuthDetailsRequest_PKCE_JWE_Valid_Smoke_sid_transactionId$",
      	"individualId": "$ID:AddIdentity_For_FAPI_smoke_Pos_UIN$",
      	"authFactorType" : "OTP",
      	"challenge" : "$ID:AddIdentity_For_FAPI_smoke_Pos_EMAIL$",
        "sendOtp":{
    "encodedHash": "$ID:OAuthDetailsRequest_PKCE_JWE_Valid_Smoke_sid_encodedResp$",
    "requestTime": "$TIMESTAMP$",
    "transactionId": "$ID:OAuthDetailsRequest_PKCE_JWE_Valid_Smoke_sid_transactionId$",
    "individualId": "$ID:AddIdentity_For_FAPI_smoke_Pos_UIN$",
    "otpChannels": [{"channel": "email"},{"channel": "phone"}],
    "sendOtpReqTemplate": "esignet/SendOtp/SendOtp",
    "sendOtpEndPoint": "/v1/esignet/authorization/send-otp"
    }
    }'
      output: '{
  "consentAction": "CAPTURE",
  "sendOtpResp":{
        "sendOtpResTemplate":"esignet/SendOtp/SendOtpResult"
    }
}'
