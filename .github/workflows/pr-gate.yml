name: PR Gate

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read           # checkout
  pull-requests: write     # dependency-review + Trivy + pgpverify PR comments
  security-events: write   # Trivy SARIF upload to the Security tab

jobs:
  pr-gate:
    # Testing ref (fork/branch holding the updated gate). After the kattu PR
    # merges, switch to: mosip/kattu/.github/workflows/pr-gate.yml@<release-tag>
    uses: Mahesh-Binayak/kattu/.github/workflows/pr-gate.yml@esignet-343
    with:
      SERVICE_LOCATION: '.'
      GO_SERVICE_LOCATION: 'esignet-service'
      NPM_SERVICE_LOCATION: 'oidc-ui'
      NPM_COVERAGE_COMMAND: 'npx vitest run --coverage'
    secrets: inherit
