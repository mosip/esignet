name: Go Package upon a push

on:
  release:
    types: [published]

  pull_request:
    types: [opened, reopened, synchronize]

  workflow_dispatch:
    inputs:
      message:
        description: 'Message for manually triggering'
        required: false
        default: 'Triggered for Updates'
        type: string

  push:
    branches:
      - '!release-branch'
      - master
      - 1.*
      - develop
      - develop-go
      - MOSIP*
      - release*
      - ES-842

jobs:
  build_go_esignet:
    uses: Prafulrakhade/kattu/.github/workflows/go-build.yml@master-go-build
    with:
      SERVICE_LOCATION: ./esignet-service
      BUILD_BINARY: esignet
      GO_VERSION: '1.26'

    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  #  sonar_analysis_go_esignet:
  #    needs: build_go_esignet
  #
  #    if: "${{ github.event_name != 'pull_request' }}"
  #
  #    uses: mosip/kattu/.github/workflows/go-sonar-analysis.yml@master
  #    with:
  #      SERVICE_LOCATION: ./esignet-service
  #      GO_VERSION: '1.23'
  #
  #    secrets:
  #      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  #      ORG_KEY: ${{ secrets.ORG_KEY }}
  #      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  build_dockers_esignet:
    needs: build_go_esignet

    strategy:
      matrix:
        include:
          - SERVICE_LOCATION: 'esignet-service'
            SERVICE_NAME: 'esignet'
            ONLY_DOCKER: true
            PLATFORMS: "linux/amd64,linux/arm64"

      fail-fast: false

    name: ${{ matrix.SERVICE_NAME }}

    uses: mosip/kattu/.github/workflows/docker-build.yml@master

    with:
      SERVICE_LOCATION: ${{ matrix.SERVICE_LOCATION }}
      SERVICE_NAME: ${{ matrix.SERVICE_NAME }}
      ONLY_DOCKER: ${{ matrix.ONLY_DOCKER }}
      PLATFORMS: ${{ matrix.PLATFORMS }}

    secrets:
      DEV_NAMESPACE_DOCKER_HUB: ${{ secrets.DEV_NAMESPACE_DOCKER_HUB }}
      ACTOR_DOCKER_HUB: ${{ secrets.ACTOR_DOCKER_HUB }}
      RELEASE_DOCKER_HUB: ${{ secrets.RELEASE_DOCKER_HUB }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  build_maven_apitest_esignet:
    uses: mosip/kattu/.github/workflows/maven-build.yml@master-java21
    with:
      SERVICE_LOCATION: ./api-test
      BUILD_ARTIFACT: apitest-esignet
    secrets:
      OSSRH_USER: ${{ secrets.OSSRH_USER }}
      OSSRH_SECRET: ${{ secrets.OSSRH_SECRET }}
      OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
      GPG_SECRET: ${{ secrets.GPG_SECRET }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  publish_to_nexus_apitest_esignet:
    if: "${{ !contains(github.ref, 'master') && github.event_name != 'pull_request' && github.event_name != 'release' && github.event_name != 'prerelease' && github.event_name != 'publish' }}"
    needs: build_maven_apitest_esignet
    uses: mosip/kattu/.github/workflows/maven-publish-to-nexus.yml@master-java21
    with:
      SERVICE_LOCATION: ./api-test
    secrets:
      OSSRH_USER: ${{ secrets.OSSRH_USER }}
      OSSRH_SECRET: ${{ secrets.OSSRH_SECRET }}
      OSSRH_URL: ${{ secrets.OSSRH_SNAPSHOT_URL }}
      OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
      GPG_SECRET: ${{ secrets.GPG_SECRET }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  build_apitest_esignet_local:
    needs: build_maven_apitest_esignet
    runs-on: ubuntu-latest
    env:
      NAMESPACE: ${{ secrets.dev_namespace_docker_hub }}
      SERVICE_NAME: apitest-esignet
      SERVICE_LOCATION: api-test
      BUILD_ARTIFACT: apitest-esignet-local

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 21
          server-id: ossrh
          settings-path: ${{ github.workspace }}

      - name: Setup the settings file for ossrh server
        run: echo "<settings> <servers>  <server>  <id>ossrh</id>    <username>${{secrets.ossrh_user}}</username> <password>${{secrets.ossrh_secret}}</password> </server> </servers> </settings>" > $GITHUB_WORKSPACE/settings.xml

      - name: Build Automationtests with Maven
        run: |
          cd ${{ env.SERVICE_LOCATION}}
          mvn clean package -s $GITHUB_WORKSPACE/settings.xml

      - name: Copy configuration files to target directory.
        run: |
          cp -r ${{ env.SERVICE_LOCATION}}/target/classes/config ${{ env.SERVICE_LOCATION}}/target/config
          cp -r ${{ env.SERVICE_LOCATION}}/testNgXmlFiles ${{ env.SERVICE_LOCATION}}/target/testNgXmlFiles

      - name: Ready the springboot artifacts
        if: ${{ !contains(github.ref, 'master') || !contains(github.ref, 'main') }}
        run: |
          find ${{ env.SERVICE_LOCATION }} -path '*/target/*' -exec zip ${{ env.BUILD_ARTIFACT }}.zip {} +

      - name: Upload the springboot jars
        if: ${{ !contains(github.ref, 'master') || !contains(github.ref, 'main') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_ARTIFACT }}
          path: ${{ env.BUILD_ARTIFACT }}.zip

  build_dockers_apitest_esignet:
    needs: build_apitest_esignet_local

    strategy:
      matrix:
        include:
          - SERVICE_LOCATION: 'api-test'
            SERVICE_NAME: 'apitest-esignet'
            BUILD_ARTIFACT: 'apitest-esignet-local'
            ONLY_DOCKER: true

      fail-fast: false

    name: ${{ matrix.SERVICE_NAME }}

    uses: mosip/kattu/.github/workflows/docker-build.yml@master-java21

    with:
      SERVICE_LOCATION: ${{ matrix.SERVICE_LOCATION }}
      SERVICE_NAME: ${{ matrix.SERVICE_NAME }}
      BUILD_ARTIFACT: ${{ matrix.BUILD_ARTIFACT }}
      ONLY_DOCKER: ${{ matrix.ONLY_DOCKER }}

    secrets:
      DEV_NAMESPACE_DOCKER_HUB: ${{ secrets.DEV_NAMESPACE_DOCKER_HUB }}
      ACTOR_DOCKER_HUB: ${{ secrets.ACTOR_DOCKER_HUB }}
      RELEASE_DOCKER_HUB: ${{ secrets.RELEASE_DOCKER_HUB }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  build-maven-uitest-esignet:
    uses: anup-nehe/kattu/.github/workflows/maven-build-browserStack.yml@develop
    with:
      SERVICE_LOCATION: ./ui-test
      BUILD_ARTIFACT: uitest-esignet
    secrets:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      OSSRH_USER: ${{ secrets.OSSRH_USER }}
      OSSRH_SECRET: ${{ secrets.OSSRH_SECRET }}
      OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
      GPG_SECRET: ${{ secrets.GPG_SECRET }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  build-dockers-uitest-esignet:
    needs: build-maven-uitest-esignet

    strategy:
      matrix:
        include:
          - SERVICE_LOCATION: 'ui-test'
            SERVICE_NAME: 'uitest-esignet'
            BUILD_ARTIFACT: 'uitest-esignet-local'
            PLATFORMS: "linux/amd64"

      fail-fast: false

    name: ${{ matrix.SERVICE_NAME }}

    uses: mosip/kattu/.github/workflows/docker-build.yml@master-java21

    with:
      SERVICE_LOCATION: ${{ matrix.SERVICE_LOCATION }}
      SERVICE_NAME: ${{ matrix.SERVICE_NAME }}
      BUILD_ARTIFACT: ${{ matrix.BUILD_ARTIFACT }}
      PLATFORMS: ${{ matrix.PLATFORMS }}

    secrets:
      DEV_NAMESPACE_DOCKER_HUB: ${{ secrets.DEV_NAMESPACE_DOCKER_HUB }}
      ACTOR_DOCKER_HUB: ${{ secrets.ACTOR_DOCKER_HUB }}
      RELEASE_DOCKER_HUB: ${{ secrets.RELEASE_DOCKER_HUB }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}