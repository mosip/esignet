name: Go Package upon a push

on:
  release:
    types: [published]

  pull_request:
    types: [opened, reopened, synchronize]

  workflow_dispatch:
    inputs:
      message:
        description: "Message for manually triggering"
        required: false
        default: "Triggered for Updates"
        type: string

  push:
    branches:
      - "!release-branch"
      - master
      - develop
      - develop-go
      - release*

jobs:
  build_go_esignet:
    uses: Prafulrakhade/kattu/.github/workflows/go-build.yml@master
    with:
      SERVICE_LOCATION: ./esignet-service
      BUILD_BINARY: esignet
      GO_VERSION: "1.26"

    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  #  sonar_analysis_go_esignet:
  #    needs: build_go_esignet
  #
  #    if: "${{ github.event_name != 'pull_request' }}"
  #
  #    uses: mosip/kattu/.github/workflows/go-sonar-analysis.yml@master
  #    with:
  #      SERVICE_LOCATION: ./esignet-service
  #      GO_VERSION: '1.23'
  #
  #    secrets:
  #      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  #      ORG_KEY: ${{ secrets.ORG_KEY }}
  #      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  build_dockers_esignet:
    needs: build_go_esignet

    strategy:
      matrix:
        include:
          - SERVICE_LOCATION: "esignet-service"
            SERVICE_NAME: "esignet"
            ONLY_DOCKER: true
            PLATFORMS: "linux/amd64,linux/arm64"

      fail-fast: false

    name: ${{ matrix.SERVICE_NAME }}

    uses: mosip/kattu/.github/workflows/docker-build.yml@master

    with:
      SERVICE_LOCATION: ${{ matrix.SERVICE_LOCATION }}
      SERVICE_NAME: ${{ matrix.SERVICE_NAME }}
      ONLY_DOCKER: ${{ matrix.ONLY_DOCKER }}
      PLATFORMS: ${{ matrix.PLATFORMS }}

    secrets:
      DEV_NAMESPACE_DOCKER_HUB: ${{ secrets.DEV_NAMESPACE_DOCKER_HUB }}
      ACTOR_DOCKER_HUB: ${{ secrets.ACTOR_DOCKER_HUB }}
      RELEASE_DOCKER_HUB: ${{ secrets.RELEASE_DOCKER_HUB }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  build-oidc-ui:
    uses: mosip/kattu/.github/workflows/npm-build.yml@develop
    with:
      SERVICE_LOCATION: oidc-ui
      BUILD_ARTIFACT: oidc
      NPM_BUILD_TYPE: BOB
      NODE_VERSION: "18"
      ZIP_DIR: build
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  sonar-analysis-oidc-ui:
    needs: build-oidc-ui
    if: "${{ github.event_name != 'pull_request' }}"
    uses: mosip/kattu/.github/workflows/npm-sonar-analysis.yml@develop
    with:
      SERVICE_LOCATION: oidc-ui
      NPM_BUILD_TYPE: BOB
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      ORG_KEY: ${{ secrets.ORG_KEY }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  build_dockers_oidc_ui:
    strategy:
      matrix:
        include:
          - SERVICE_LOCATION: "oidc-ui"
            SERVICE_NAME: "oidc-ui"
            SQUASH_LAYERS: "13"
      fail-fast: false
    name: ${{ matrix.SERVICE_NAME }}
    uses: mosip/kattu/.github/workflows/docker-build.yml@master-java21
    with:
      SERVICE_LOCATION: ${{ matrix.SERVICE_LOCATION }}
      SERVICE_NAME: ${{ matrix.SERVICE_NAME }}
      SQUASH_LAYERS: ${{ matrix.SQUASH_LAYERS }}
    secrets:
      DEV_NAMESPACE_DOCKER_HUB: ${{ secrets.DEV_NAMESPACE_DOCKER_HUB }}
      ACTOR_DOCKER_HUB: ${{ secrets.ACTOR_DOCKER_HUB }}
      RELEASE_DOCKER_HUB: ${{ secrets.RELEASE_DOCKER_HUB }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
