apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "common.names.fullname" . }}-nginx-cm
  namespace: {{ .Release.Namespace }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
data:
  nginx.conf: |-
    worker_processes  1;
    
    events {
      worker_connections  1024;
    }
    
    http {
      access_log /var/log/nginx/access1.log;
      error_log /var/log/nginx/error1.log;
      
      server {
        listen {{ .Values.oidc_ui.oidc_ui_port }};
        server_name  localhost;

        root   /usr/share/nginx/html;
        index  index.html index.htm;
        include /etc/nginx/mime.types;

        gzip on;
        gzip_min_length 1000;
        gzip_proxied expired no-cache no-store private auth;
        gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

        location /v1/esignet/ {
          proxy_pass         http://{{ .Values.oidc_ui.oidc_service_host }}/;
          proxy_redirect     off;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Host $server_name;
          add_header Content-Security-Policy "default-src 'none'" always;
          add_header Referrer-Policy "no-referrer" always;
        }
    
        location /v1/esignet/actuator/ {
          proxy_pass         http://{{ .Values.oidc_ui.oidc_service_host }}/;
          proxy_redirect     off;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Host $server_name;
          add_header Content-Security-Policy "default-src 'none'" always;
          add_header Referrer-Policy "no-referrer" always;
        }
    
        location /.well-known/jwks.json {
          proxy_pass         http://{{ .Values.oidc_ui.oidc_service_host }}/.well-known/jwks.json;
          proxy_redirect     off;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Host $server_name;
          add_header Content-Security-Policy "default-src 'none'" always;
          add_header Referrer-Policy "no-referrer" always;
          types {
            text/plain log cer json txt;
          }
        }
        
        location /.well-known/openid-configuration {
          proxy_pass         http://{{ .Values.oidc_ui.oidc_service_host }}/.well-known/openid-configuration;
          proxy_redirect     off;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Host $server_name;
          add_header Content-Security-Policy "default-src 'none'" always;
          add_header Referrer-Policy "no-referrer" always;
          add_header 'Access-Control-Allow-Origin' $cors_allowed_origin always;
          add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
          add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
          types {
            text/plain log cer json txt;
          }
        }
    
        location /.well-known/oauth-authorization-server {
          proxy_pass         http://{{ .Values.oidc_ui.oidc_service_host }}/.well-known/oauth-authorization-server;
          proxy_redirect     off;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Host $server_name;
          add_header Content-Security-Policy "default-src 'none'" always;
          add_header Referrer-Policy "no-referrer" always;
          types {
            text/plain log cer json txt;
          }
        }
        

        location / {
          try_files $uri $uri/ /index.html;
          add_header Content-Security-Policy "
            default-src 'self';
            style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
            font-src 'self' https://fonts.gstatic.com;
            img-src 'self' data: https://cdn.jsdelivr.net https://*.mosip.net;
            script-src 'self' https://www.google.com  https://www.gstatic.com;
            frame-src https://www.google.com;
            connect-src 'self' http://127.0.0.1:*;
          " always;
          add_header Referrer-Policy "no-referrer" always;
        }
      }
    }
{{- if .Values.oidc_ui.configmaps }}
  {{- range $cm_name, $cm_value := .Values.oidc_ui.configmaps }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $cm_name }}
  namespace: {{ $.Release.Namespace }}
  labels: {{- include "common.labels.standard" $ | nindent 8 }}
    {{- if $.Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" $.Values.commonLabels "context" $ ) | nindent 8 }}
    {{- end }}
  {{- if $.Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" $.Values.commonAnnotations "context" $ ) | nindent 8 }}
  {{- end }}
data:
  {{- range $key, $value := $cm_value }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
  {{- end }}