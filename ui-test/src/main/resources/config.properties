# url
baseurl =

#sampleLocaleUrl = https://sample-mock.es-qa1.mosip.net/
localeUrl =

signupUrl =

# allowed plugin values are (mosipid/mock)
pluginToExecute =

esignetSupportedLanguage = eng

keycloakAuthTokenEndPoint =/auth/realms/mosip/protocol/openid-connect/token
actuatorSignupEndpoint =/v1/signup/actuator/env
uiSpecEndpoint =/v1/signup/registration/ui-spec

# For single browser
browserName=chrome

runLanguage=

# For multi-browser execution
runMultipleBrowsers=false
browsers=chrome,edge

# For BrowserStack (required fields)
browserVersion=latest
browserStackOs=Windows
osVersion=10
runOnBrowserStack=true
threadCount=4

# BrowserStack credentials
browserstack_username=
browserstack_access_key=

# Other flags
headless=true
mobileEmulation=false
mobileDevice=Pixel 5
explicitWaitTimeout=

#properties
eSignetbaseurl =
authorizeUrlTemplate = /authorize?client_id=$CLIENT_ID$&request_uri=$REQUEST_URI$

# Pre-existing OIDC client to use for the default (non-PAR) scenarios. When set, the client
# creation API call is skipped and this value is used instead; leave blank to create one per run.
oidcClientId =

#Ex: Uin=677576500 and Vid=98705032108764
uin =
vid =
#Local number only, no country code - overrides the AddIdentity-prerequisite-derived phone used
#for OTP login when set.
uinPhoneNumber =

#Ex: mockUin=677576500
mockUin =

DelayInMilliSecAfterUinGeneration = 90000

# ChromeDriver path used when running inside Docker on Linux
chromeDriverPath=/usr/bin/chromedriver
runDocker=no

# Keycloak URL.
keycloak-external-url =

#------------------------ secrets and passwords  ------------------------#

#------------------------ Keycloak Passwords ------------------------#
# Used for Keycloak authentication.
keycloak_Password =

#-------- Client Secret Keys ----------#
# These keys are used for various services, make sure to update the values as required when running locally.
mosip_pms_client_secret =
mosip_resident_client_secret =
mosip_idrepo_client_secret =
mosip_admin_client_secret =
mpartner_default_mobile_secret =
mosip_testrig_client_secret =
AuthClientSecret =


#-------- Generic Configuration ----------#

# Enable or disable debugging mode (yes/no).
enableDebug = yes

# Whether to use pre-configured OTP (true/false).
usePreConfiguredOtp =

# Mock Notification Channels (email/phone/email,phone).
mockNotificationChannel = email,phone
smtpURL =


#------------------------ Mosip Components Base URLs ------------------------#
# Define base URLs for different components if required.
# Example:
# mosip_components_base_urls = auditmanager=api-internal.qa11new.mosip.net;idrepository=api-internal.qa11new.mosip.net;authmanager=api-internal.qa11new.mosip.net;resident=api-internal.qa11new.mosip.net;partnermanager=api-internal.qa11new.mosip.net;idauthentication=api-internal.qa11new.mosip.net;masterdata=api-internal.qa11new.mosip.net;idgenerator=api-internal.qa11new.mosip.net;policymanager=api-internal.qa11new.mosip.net;preregistration=api-internal.qa11new.mosip.net;keymanager=api-internal.qa11new.mosip.net;mock-identity-system=api.qa11new.mosip.net
# Feel free to add more components as needed.
mosip_components_base_urls =

#------------------------ Module Name Pattern ------------------------#
# Define module name pattern if required.
# Example:
# moduleNamePattern = (mimoto|resident)
# Feel free to add more values as needed.
moduleNamePattern =

#------------------------ Feature File Filter ------------------------#
# Comma-separated list of feature file names (without .feature extension) to execute.
# Example: featureFilesToExecute = ConsentPage,LoginOptions,SignUp
# Leave empty to run ALL feature files.
featureFilesToExecute =
#------------------------ Uncomment for Local Run ------------------------#

# Path to the authentication certificates (if running locally, uncomment the below line and keep the value empty).
authCertsPath =

# X-XSS-Protection: Controls the XSS (Cross-Site Scripting) filter in browsers.
# Values: (yes/no)
xssProtectionCheck = no