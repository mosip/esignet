      role: idrepo
      restMethod: post
      inputTemplate: esignetUI/CreateVID/createVid
      outputTemplate: esignetUI/CreateVID/createVidResult
      input: '{
    "vidType": "Perpetual",
    "UIN": "$ID:AddIdentity_Vid_Generation_smoke_Pos_UIN$",
    "version": "v1",
    "id": "mosip.vid.create",
    "requesttime": "$TIMESTAMP$"
}'
