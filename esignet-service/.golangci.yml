version: "2"

linters:
  default: standard
  enable:
    - errorlint  # checks for common error wrapping issues
    - gocritic   # opinionated but useful checks
    - misspell   # catches common misspellings
    - revive     # extensible linter, replacement for golint

formatters:
  enable:
    - gofmt      # checks code formatting per gofmt
    - goimports  # checks import grouping and ordering
  settings:
    goimports:
      local-prefixes:
        - github.com/aarock1234/go-template
