id: decl-flow-1
handle: decl-flow-1
name: Declarative Test Flow
flowType: AUTHENTICATION
activeVersion: 1
nodes:
  - id: start
    type: START
    onSuccess: prompt_credentials
  - id: prompt_credentials
    type: PROMPT
    prompts:
      - inputs:
          - ref: input_001
            identifier: username
            type: TEXT_INPUT
            required: true
          - ref: input_002
            identifier: password
            type: PASSWORD_INPUT
            required: true
        action:
          ref: action_001
          nextNode: basic_auth
  - id: basic_auth
    type: TASK_EXECUTION
    executor:
      name: BasicAuthExecutor
      inputs:
        - ref: input_001
          identifier: username
          type: TEXT_INPUT
          required: true
        - ref: input_002
          identifier: password
          type: PASSWORD_INPUT
          required: true
    onSuccess: authorization_check
  - id: authorization_check
    type: TASK_EXECUTION
    executor:
      name: AuthorizationExecutor
    onSuccess: auth_assert
  - id: auth_assert
    type: TASK_EXECUTION
    executor:
      name: AuthAssertExecutor
    onSuccess: end
  - id: end
    type: END
