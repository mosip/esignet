id: flow-declarative-multi-flow-1
name: Default Basic Authentication Flow
handle: default-basic-multi-flow
flowType: AUTHENTICATION
nodes:
  - id: start
    type: START
    layout:
      size:
        width: 101
        height: 34
      position:
        x: 100
        y: 1050
    onSuccess: auth_factor

  - id: auth_factor
    type: PROMPT
    meta:
      components:
        - id: text_title
          type: TEXT
          label: Sign In
          variant: HEADING_3
          category: DISPLAY
          resourceType: ELEMENT
        - id: block_auth_options
          type: BLOCK
          category: BLOCK
          components:
            - id: action_otp
              type: ACTION
              label: Verify with OTP
              variant: PRIMARY
              category: ACTION
              eventType: SUBMIT
              resourceType: ELEMENT
            - id: action_password
              type: ACTION
              label: Verify with Password
              variant: SECONDARY
              category: ACTION
              eventType: SUBMIT
              resourceType: ELEMENT
          resourceType: ELEMENT
    layout:
      size:
        width: 350
        height: 280
      position:
        x: 350
        y: 1000
    prompts:
      - action:
          ref: action_otp
          nextNode: prompt_otp_phone
      - action:
          ref: action_password
          nextNode: prompt_pwd_phone

  - id: prompt_otp_phone
    type: PROMPT
    meta:
      components:
        - id: block_otp_phone
          type: BLOCK
          category: BLOCK
          components:
            - id: tab_phone
              type: ACTION
              label: Phone
              variant: PRIMARY
              category: ACTION
              eventType: TRIGGER
              resourceType: ELEMENT
            - id: tab_email
              type: ACTION
              label: Email
              variant: OUTLINED
              category: ACTION
              eventType: TRIGGER
              resourceType: ELEMENT
            - id: tab_vid
              type: ACTION
              label: VID
              variant: OUTLINED
              category: ACTION
              eventType: TRIGGER
              resourceType: ELEMENT
            - id: input_phone
              ref: username
              hint: ""
              type: PHONE_INPUT
              label: Mobile Number
              category: FIELD
              required: true
              placeholder: Enter your mobile number
              postfix: "@phone"
              prefixes:
                - label: "+91"
                  value: "+91"
                  maxLength: 10
                  regex: "^[0-9]{10}$"
                - label: "+855"
                  value: "+855"
                  maxLength: 9
                  regex: "^[0-9]{9}$"
              validation:
                - type: regex
                  value: "^[0-9]{10}$"
                  message: "{{i18n(validation:phone.pattern.invalid)}}"
                - type: maxLength
                  value: 10
                  message: "{{i18n(validation:phone.maxLength.invalid)}}"
              resourceType: ELEMENT
            - id: action_continue
              type: ACTION
              label: Continue
              variant: PRIMARY
              category: ACTION
              eventType: SUBMIT
              resourceType: ELEMENT
          resourceType: ELEMENT
    layout:
      size:
        width: 350
        height: 460
      position:
        x: 850
        y: -100
    prompts:
      - action:
          ref: action_continue
          nextNode: task_sendotp
        inputs:
          - ref: input_phone
            type: PHONE_INPUT
            required: true
            identifier: username
            validation:
              - type: regex
                value: "^[0-9]{10}$"
                message: "{{i18n(validation:phone.pattern.invalid)}}"
              - type: maxLength
                value: 10
                message: "{{i18n(validation:phone.maxLength.invalid)}}"
      - action:
          ref: tab_email
          nextNode: prompt_otp_email
        inputs: []
      - action:
          ref: tab_vid
          nextNode: prompt_otp_vid
        inputs: []

  - id: prompt_otp_email
    type: PROMPT
    meta:
      components:
        - id: block_otp_email
          type: BLOCK
          category: BLOCK
          components:
            - id: tab_phone
              type: ACTION
              label: Phone
              variant: OUTLINED
              category: ACTION
              eventType: TRIGGER
              resourceType: ELEMENT
            - id: tab_email
              type: ACTION
              label: Email
              variant: PRIMARY
              category: ACTION
              eventType: TRIGGER
              resourceType: ELEMENT
            - id: tab_vid
              type: ACTION
              label: VID
              variant: OUTLINED
              category: ACTION
              eventType: TRIGGER
              resourceType: ELEMENT
            - id: input_email
              ref: username
              hint: ""
              type: EMAIL_INPUT
              label: Email Address
              category: FIELD
              required: true
              placeholder: Enter your email address
              postfix: "@thunder.sky"
              validation:
                - type: regex
                  value: "^[a-zA-Z0-9._%+\\-]+$"
                  message: "{{i18n(validation:email.pattern.invalid)}}"
                - type: maxLength
                  value: 64
                  message: "{{i18n(validation:email.maxLength.invalid)}}"
              resourceType: ELEMENT
            - id: action_continue
              type: ACTION
              label: Continue
              variant: PRIMARY
              category: ACTION
              eventType: SUBMIT
              resourceType: ELEMENT
          resourceType: ELEMENT
    layout:
      size:
        width: 350
        height: 460
      position:
        x: 850
        y: 450
    prompts:
      - action:
          ref: tab_phone
          nextNode: prompt_otp_phone
        inputs: []
      - action:
          ref: action_continue
          nextNode: task_sendotp
        inputs:
          - ref: input_email
            type: EMAIL_INPUT
            required: true
            identifier: username
            validation:
              - type: regex
                value: "^[a-zA-Z0-9._%+\\-]+$"
                message: "{{i18n(validation:email.pattern.invalid)}}"
              - type: maxLength
                value: 64
                message: "{{i18n(validation:email.maxLength.invalid)}}"
      - action:
          ref: tab_vid
          nextNode: prompt_otp_vid
        inputs: []

  - id: prompt_otp_vid
    type: PROMPT
    meta:
      components:
        - id: block_otp_vid
          type: BLOCK
          category: BLOCK
          components:
            - id: tab_phone
              type: ACTION
              label: Phone
              variant: OUTLINED
              category: ACTION
              eventType: TRIGGER
              resourceType: ELEMENT
            - id: tab_email
              type: ACTION
              label: Email
              variant: OUTLINED
              category: ACTION
              eventType: TRIGGER
              resourceType: ELEMENT
            - id: tab_vid
              type: ACTION
              label: VID
              variant: PRIMARY
              category: ACTION
              eventType: TRIGGER
              resourceType: ELEMENT
            - id: input_vid
              ref: username
              hint: ""
              type: TEXT_INPUT
              label: VID
              category: FIELD
              required: true
              inputType: text
              placeholder: Enter your VID
              validation:
                - type: regex
                  value: "^[A-Z0-9]+$"
                  message: "{{i18n(validation:vid.pattern.invalid)}}"
                - type: maxLength
                  value: 20
                  message: "{{i18n(validation:vid.maxLength.invalid)}}"
              resourceType: ELEMENT
            - id: action_continue
              type: ACTION
              label: Continue
              variant: PRIMARY
              category: ACTION
              eventType: SUBMIT
              resourceType: ELEMENT
          resourceType: ELEMENT
    layout:
      size:
        width: 350
        height: 460
      position:
        x: 850
        y: 1000
    prompts:
      - action:
          ref: tab_phone
          nextNode: prompt_otp_phone
        inputs: []
      - action:
          ref: tab_email
          nextNode: prompt_otp_email
        inputs: []
      - action:
          ref: action_continue
          nextNode: task_sendotp
        inputs:
          - ref: input_vid
            type: TEXT_INPUT
            required: true
            identifier: username
            validation:
              - type: regex
                value: "^[A-Z0-9]+$"
                message: "{{i18n(validation:vid.pattern.invalid)}}"
              - type: maxLength
                value: 20
                message: "{{i18n(validation:vid.maxLength.invalid)}}"

  - id: task_sendotp
    type: TASK_EXECUTION
    layout:
      size:
        width: 200
        height: 113
      position:
        x: 1900
        y: 500
    executor:
      name: MosipOtpExecutor
      inputs:
        - ref: username
          type: TEXT_INPUT
          required: true
          identifier: username
    onSuccess: prompt_enter_otp

  - id: prompt_enter_otp
    type: PROMPT
    meta:
      components:
        - id: text_otp_title
          type: TEXT
          label: Enter OTP
          variant: HEADING_3
          category: DISPLAY
          resourceType: ELEMENT
        - id: block_enter_otp
          type: BLOCK
          category: BLOCK
          components:
            - id: input_otp
              ref: otp
              hint: ""
              type: OTP_INPUT
              label: Please enter the 6-digit OTP sent to your registered contact
              category: FIELD
              required: true
              placeholder: ""
              validation:
                - type: regex
                  value: "^[0-9]{6}$"
                  message: "{{i18n(validation:otp.pattern.invalid)}}"
              resourceType: ELEMENT
            - id: action_verify
              type: ACTION
              label: Verify
              variant: PRIMARY
              category: ACTION
              eventType: SUBMIT
              resourceType: ELEMENT
            - id: action_resend
              type: ACTION
              label: Resend OTP
              variant: TEXT
              category: ACTION
              eventType: SUBMIT
              resourceType: ELEMENT
          resourceType: ELEMENT
    layout:
      size:
        width: 350
        height: 480
      position:
        x: 2350
        y: 450
    prompts:
      - action:
          ref: action_verify
          nextNode: task_verify_otp
        inputs:
          - ref: input_otp
            type: OTP_INPUT
            required: true
            identifier: otp
            validation:
              - type: regex
                value: "^[0-9]{6}$"
                message: "{{i18n(validation:otp.pattern.invalid)}}"
      - action:
          ref: action_resend
          nextNode: task_sendotp
        inputs: []

  - id: task_verify_otp
    type: TASK_EXECUTION
    layout:
      size:
        width: 217
        height: 113
      position:
        x: 2900
        y: 500
    executor:
      name: BasicAuthExecutor
      inputs:
        - ref: username
          type: TEXT_INPUT
          required: true
          identifier: username
        - ref: input_otp
          type: OTP_INPUT
          required: true
          identifier: otp
    onSuccess: authorization_check
    onFailure: prompt_enter_otp
    onIncomplete: prompt_otp_phone

  - id: prompt_pwd_phone
    type: PROMPT
    meta:
      components:
        - id: block_pwd_phone
          type: BLOCK
          category: BLOCK
          components:
            - id: tab_phone
              type: ACTION
              label: Phone
              variant: PRIMARY
              category: ACTION
              eventType: TRIGGER
              resourceType: ELEMENT
            - id: tab_email
              type: ACTION
              label: Email
              variant: OUTLINED
              category: ACTION
              eventType: TRIGGER
              resourceType: ELEMENT
            - id: tab_vid
              type: ACTION
              label: VID
              variant: OUTLINED
              category: ACTION
              eventType: TRIGGER
              resourceType: ELEMENT
            - id: input_phone
              ref: username
              hint: ""
              type: PHONE_INPUT
              label: Mobile Number
              category: FIELD
              required: true
              placeholder: Enter your mobile number
              postfix: "@phone"
              prefixes:
                - label: "+91"
                  value: "+91"
                  maxLength: 10
                  regex: "^[0-9]{10}$"
                - label: "+855"
                  value: "+855"
                  maxLength: 9
                  regex: "^[0-9]{9}$"
              validation:
                - type: regex
                  value: "^[0-9]{10}$"
                  message: "{{i18n(validation:phone.pattern.invalid)}}"
                - type: maxLength
                  value: 10
                  message: "{{i18n(validation:phone.maxLength.invalid)}}"
              resourceType: ELEMENT
            - id: action_continue
              type: ACTION
              label: Continue
              variant: PRIMARY
              category: ACTION
              eventType: SUBMIT
              resourceType: ELEMENT
          resourceType: ELEMENT
    layout:
      size:
        width: 350
        height: 460
      position:
        x: 850
        y: 1600
    prompts:
      - action:
          ref: action_continue
          nextNode: prompt_enter_pwd
        inputs:
          - ref: input_phone
            type: PHONE_INPUT
            required: true
            identifier: username
            validation:
              - type: regex
                value: "^[0-9]{10}$"
                message: "{{i18n(validation:phone.pattern.invalid)}}"
              - type: maxLength
                value: 10
                message: "{{i18n(validation:phone.maxLength.invalid)}}"
      - action:
          ref: tab_email
          nextNode: prompt_pwd_email
        inputs: []
      - action:
          ref: tab_vid
          nextNode: prompt_pwd_vid
        inputs: []

  - id: prompt_pwd_email
    type: PROMPT
    meta:
      components:
        - id: block_pwd_email
          type: BLOCK
          category: BLOCK
          components:
            - id: tab_phone
              type: ACTION
              label: Phone
              variant: OUTLINED
              category: ACTION
              eventType: TRIGGER
              resourceType: ELEMENT
            - id: tab_email
              type: ACTION
              label: Email
              variant: PRIMARY
              category: ACTION
              eventType: TRIGGER
              resourceType: ELEMENT
            - id: tab_vid
              type: ACTION
              label: VID
              variant: OUTLINED
              category: ACTION
              eventType: TRIGGER
              resourceType: ELEMENT
            - id: input_email
              ref: username
              hint: ""
              type: EMAIL_INPUT
              label: Email Address
              category: FIELD
              required: true
              placeholder: Enter your email address
              postfix: "@thunder.sky"
              validation:
                - type: regex
                  value: "^[a-zA-Z0-9._%+\\-]+$"
                  message: "{{i18n(validation:email.pattern.invalid)}}"
                - type: maxLength
                  value: 64
                  message: "{{i18n(validation:email.maxLength.invalid)}}"
              resourceType: ELEMENT
            - id: action_continue
              type: ACTION
              label: Continue
              variant: PRIMARY
              category: ACTION
              eventType: SUBMIT
              resourceType: ELEMENT
          resourceType: ELEMENT
    layout:
      size:
        width: 350
        height: 460
      position:
        x: 850
        y: 2150
    prompts:
      - action:
          ref: tab_phone
          nextNode: prompt_pwd_phone
        inputs: []
      - action:
          ref: action_continue
          nextNode: prompt_enter_pwd
        inputs:
          - ref: input_email
            type: EMAIL_INPUT
            required: true
            identifier: username
            validation:
              - type: regex
                value: "^[a-zA-Z0-9._%+\\-]+$"
                message: "{{i18n(validation:email.pattern.invalid)}}"
              - type: maxLength
                value: 64
                message: "{{i18n(validation:email.maxLength.invalid)}}"
      - action:
          ref: tab_vid
          nextNode: prompt_pwd_vid
        inputs: []

  - id: prompt_pwd_vid
    type: PROMPT
    meta:
      components:
        - id: block_pwd_vid
          type: BLOCK
          category: BLOCK
          components:
            - id: tab_phone
              type: ACTION
              label: Phone
              variant: OUTLINED
              category: ACTION
              eventType: TRIGGER
              resourceType: ELEMENT
            - id: tab_email
              type: ACTION
              label: Email
              variant: OUTLINED
              category: ACTION
              eventType: TRIGGER
              resourceType: ELEMENT
            - id: tab_vid
              type: ACTION
              label: VID
              variant: PRIMARY
              category: ACTION
              eventType: TRIGGER
              resourceType: ELEMENT
            - id: input_vid
              ref: username
              hint: ""
              type: TEXT_INPUT
              label: VID
              category: FIELD
              required: true
              inputType: text
              placeholder: Enter your VID
              validation:
                - type: regex
                  value: "^[A-Z0-9]+$"
                  message: "{{i18n(validation:vid.pattern.invalid)}}"
                - type: maxLength
                  value: 20
                  message: "{{i18n(validation:vid.maxLength.invalid)}}"
              resourceType: ELEMENT
            - id: action_continue
              type: ACTION
              label: Continue
              variant: PRIMARY
              category: ACTION
              eventType: SUBMIT
              resourceType: ELEMENT
          resourceType: ELEMENT
    layout:
      size:
        width: 350
        height: 460
      position:
        x: 850
        y: 2700
    prompts:
      - action:
          ref: tab_phone
          nextNode: prompt_pwd_phone
        inputs: []
      - action:
          ref: tab_email
          nextNode: prompt_pwd_email
        inputs: []
      - action:
          ref: action_continue
          nextNode: prompt_enter_pwd
        inputs:
          - ref: input_vid
            type: TEXT_INPUT
            required: true
            identifier: username
            validation:
              - type: regex
                value: "^[A-Z0-9]+$"
                message: "{{i18n(validation:vid.pattern.invalid)}}"
              - type: maxLength
                value: 20
                message: "{{i18n(validation:vid.maxLength.invalid)}}"

  - id: prompt_enter_pwd
    type: PROMPT
    meta:
      components:
        - id: text_pwd_title
          type: TEXT
          label: Enter Password
          variant: HEADING_3
          category: DISPLAY
          resourceType: ELEMENT
        - id: block_enter_pwd
          type: BLOCK
          category: BLOCK
          components:
            - id: input_password
              ref: password
              hint: ""
              type: PASSWORD_INPUT
              label: Password
              category: FIELD
              required: true
              placeholder: Enter your password
              validation:
                - type: minLength
                  value: 8
                  message: "{{i18n(validation:password.minLength.invalid)}}"
                - type: maxLength
                  value: 128
                  message: "{{i18n(validation:password.maxLength.invalid)}}"
              resourceType: ELEMENT
            - id: action_login
              type: ACTION
              label: Login
              variant: PRIMARY
              category: ACTION
              eventType: SUBMIT
              resourceType: ELEMENT
          resourceType: ELEMENT
    layout:
      size:
        width: 350
        height: 360
      position:
        x: 1900
        y: 2200
    prompts:
      - action:
          ref: action_login
          nextNode: task_verify_pwd
        inputs:
          - ref: input_password
            type: PASSWORD_INPUT
            required: true
            identifier: password
            validation:
              - type: minLength
                value: 8
                message: "{{i18n(validation:password.minLength.invalid)}}"
              - type: maxLength
                value: 128
                message: "{{i18n(validation:password.maxLength.invalid)}}"

  - id: task_verify_pwd
    type: TASK_EXECUTION
    layout:
      size:
        width: 217
        height: 113
      position:
        x: 2450
        y: 2250
    executor:
      name: BasicAuthExecutor
      inputs:
        - ref: username
          type: TEXT_INPUT
          required: true
          identifier: username
        - ref: input_password
          type: PASSWORD_INPUT
          required: true
          identifier: password
    onSuccess: authorization_check
    onFailure: prompt_enter_pwd
    onIncomplete: prompt_pwd_phone

  - id: authorization_check
    type: TASK_EXECUTION
    layout:
      size:
        width: 200
        height: 113
      position:
        x: 3200
        y: 1150
    executor:
      name: AuthorizationExecutor
    onSuccess: auth_assert

  - id: auth_assert
    type: TASK_EXECUTION
    layout:
      size:
        width: 244
        height: 113
      position:
        x: 3500
        y: 1150
    executor:
      name: AuthAssertExecutor
    onSuccess: end

  - id: end
    type: END
    layout:
      size:
        width: 85
        height: 34
      position:
        x: 3850
        y: 1167
