id: decl-app-jwt-client-1
name: Declarative JWT Client Application
description: Confidential OAuth client for private_key_jwt smoke testing
ou_id: decl-ou-1
template: web
auth_flow_id: decl-flow-1
registration_flow_id: decl-reg-flow-1
recovery_flow_id: decl-recovery-flow-1
url: https://example.com
contacts:
  - test@example.com
inbound_auth_config:
  - type: "oauth2"
    config:
      client_id: "decl-jwt-client-1"
      redirect_uris:
        - "https://localhost:3000"
      grant_types:
        - "authorization_code"
      response_types:
        - "code"
      token_endpoint_auth_method: "private_key_jwt"
