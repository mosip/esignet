id: otp-flow
handle: otp-flow
name: eSignet OTP Flow
flowType: AUTHENTICATION
activeVersion: 1
nodes:
  - id: start
    type: START
    onSuccess: prompt_individual_id

  - id: prompt_individual_id
    type: PROMPT
    meta:
      components:
        - id: "heading_details"
          resourceType: "ELEMENT"
          type: "BLOCK"
          category: "BLOCK"
          align: "center"
          components:
            - category: "DISPLAY"
              id: "text_xukp"
              label: "{{t(header:login_heading)}}"
              resourceType: "ELEMENT"
              type: "TEXT"
              variant: "HEADING_3"
              align: "center"
            - category: "DISPLAY"
              id: "text_subheading"
              label: "<center><b>{{meta(application.name)}}</b> {{t(header:login_subheading)}}</center>"
              resourceType: "ELEMENT"
              type: "RICH_TEXT"
              variant: "SUBTITLE_2"
              align: "center"
        - id: "logo_block"
          type: "STACK"
          resourceType: "ELEMENT"
          direction: "col"
          justify: "center"
          components:
            - category: "DISPLAY"
              id: "client_logo"
              label: ""
              resourceType: "ELEMENT"
              type: "IMAGE"
              src: "{{meta(application.logoUrl)}}"
              alt: "{{t(signin:images.app_logo.alt)}}"
              height: "52px"
              width: "52px"
            - category: "DISPLAY"
              id: "logo_divider"
              label: "&#x21CB;"
              resourceType: "ELEMENT"
              type: "RICH_TEXT"
              height: "24px"
              "width": "24px"
            - category: "DISPLAY"
              id: "app_logo"
              label: ""
              resourceType: "ELEMENT"
              type: "IMAGE"
              src: "/logo.png"
              alt: "{{t(signin:images.app_logo.alt)}}"
              height: "52px"
              width: "52px"
        - type: BLOCK
          id: block_001
          components:
            - id: username_input
              ref: username
              type: TEXT_INPUT
              label: "{{t(input:username_label)}}"
              required: true
              placeholder: "{{t(input:username_placeholder)}}"
            - id: action_submit_individual_id
              type: ACTION
              label: "{{t(button:continue)}}"
              variant: PRIMARY
              category: ACTION
              eventType: SUBMIT
              resourceType: ELEMENT
    prompts:
      - inputs:
          - ref: username_input
            identifier: username
            type: TEXT_INPUT
            required: true
        action:
          ref: action_submit_individual_id
          nextNode: send_mosip_otp

  - id: send_mosip_otp
    type: TASK_EXECUTION
    executor:
      name: MosipOtpExecutor
    onSuccess: prompt_otp

  - id: prompt_otp
    type: PROMPT
    meta:
      components:
        - id: "heading_details"
          resourceType: "ELEMENT"
          type: "BLOCK"
          category: "BLOCK"
          align: "center"
          components:
            - category: "DISPLAY"
              id: "text_xukp"
              label: "{{t(header:login_heading)}}"
              resourceType: "ELEMENT"
              type: "TEXT"
              variant: "HEADING_3"
              align: "center"
            - category: "DISPLAY"
              id: "text_subheading"
              label: "<center><b>{{meta(application.name)}}</b> {{t(header:login_subheading)}}</center>"
              resourceType: "ELEMENT"
              type: "RICH_TEXT"
              variant: "SUBTITLE_2"
              align: "center"
        - id: "logo_block"
          type: "STACK"
          resourceType: "ELEMENT"
          direction: "col"
          justify: "center"
          components:
            - category: "DISPLAY"
              id: "client_logo"
              label: ""
              resourceType: "ELEMENT"
              type: "IMAGE"
              src: "{{meta(application.logoUrl)}}"
              alt: "{{t(signin:images.app_logo.alt)}}"
              height: "52px"
              width: "52px"
            - category: "DISPLAY"
              id: "logo_divider"
              label: "&#x21CB;"
              resourceType: "ELEMENT"
              type: "RICH_TEXT"
              height: "24px"
              "width": "24px"
            - category: "DISPLAY"
              id: "app_logo"
              label: ""
              resourceType: "ELEMENT"
              type: "IMAGE"
              src: "/logo.png"
              alt: "{{t(signin:images.app_logo.alt)}}"
              height: "52px"
              width: "52px"
        - id: text_otp_title
          type: TEXT
          label: "{{t(otp:enter_otp_title)}}"
          variant: HEADING_3
          category: DISPLAY
          resourceType: ELEMENT
        - id: block_enter_otp
          type: BLOCK
          category: BLOCK
          components:
            - id: otp_input
              ref: otp
              type: OTP_INPUT
              label: "{{t(otp:otp_sent_msg)}}"
              category: FIELD
              required: true
            - id: action_submit_otp
              type: ACTION
              label: "{{t(button:verify)}}"
              variant: PRIMARY
              category: ACTION
              eventType: SUBMIT
              resourceType: ELEMENT
    prompts:
      - inputs:
          - ref: otp_input
            identifier: otp
            type: TEXT_INPUT
            required: true
        action:
          ref: action_submit_otp
          nextNode: basic_auth

  - id: basic_auth
    type: TASK_EXECUTION
    executor:
      name: CredentialsAuthExecutor
      inputs:
        - ref: username_input
          identifier: username
          type: TEXT_INPUT
          required: true
        - ref: otp_input
          identifier: otp
          type: PASSWORD_INPUT
          required: true
    onSuccess: authorization_check

  - id: authorization_check
    type: TASK_EXECUTION
    executor:
      name: AuthorizationExecutor
    onSuccess: auth_assert

  - id: auth_assert
    type: TASK_EXECUTION
    executor:
      name: AuthAssertExecutor
    onSuccess: end

  - id: end
    type: END